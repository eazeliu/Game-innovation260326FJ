<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Game Show - Rotation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <video id="main-bg-video" autoplay muted loop playsinline class="bg-video">
        <source src="./videos/main-bg.mp4" type="video/webm">
    </video>

    <div class="ui-overlay">
        <div class="control-row">
            Speed (°/s): <input type="number" id="speedInput" value="0" min="-720" max="720">
            <button id="startBtn">SET</button>
            <button id="stopBtn" class="btn-stop">STOP</button>
            <button id="resetBtn" class="btn-reset">RESET</button>
        </div>
        
        <div class="control-row">
            <input type="range" id="speedSlider" min="-720" max="720" value="0" style="width: 100%;">
        </div>

        <div class="control-row">
            <button id="nestBtn" class="btn-mode">Switch to Nested</button>
        </div>

        <div class="control-row status-container">
            <div class="status-info">
                Speed: <span id="currentSpeed">0</span> °/s <br>
                <small id="modeText">Mode：Unnested</small>
                <div id="fpsDiv"></div>
            </div>
            <div class="status-info">
                <button id="bonusTrigger">BONUS</button>
            </div>
        </div> 
    </div>

    <div id="canvas-container">
        <div id="outer-wheel">
            <div id="outer-wheel-UI">
                <video class="bonus-assign v-12" muted playsinline loop src="./videos/seven-effect.webm"></video>
                <video class="bonus-assign v-3"  muted playsinline loop src="./videos/seven-effect.webm"></video>
                <video class="bonus-assign v-5"  muted playsinline loop src="./videos/seven-effect.webm"></video>
                <video class="bonus-assign v-8"  muted playsinline loop src="./videos/seven-effect.webm"></video>
            </div>
        </div>
        
        <div id="inner-panel">
            <div class="inner-content">
                <div class="text" data-text="1000x">1000x</div>
                <div class="mode-indicator">BONUS ASSIGNED</div>
            </div>

            <video class="inner-video wheel-loop" autoplay muted loop playsinline src="./videos/wheel-loop.webm"></video>
            <video id="bonus-bg" class="inner-video" muted loop playsinline src="./videos/wheel-particle.webm"></video>
            <video class="inner-video wheel-bg" autoplay muted loop playsinline src="./videos/wheel-bg.mp4"></video>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
